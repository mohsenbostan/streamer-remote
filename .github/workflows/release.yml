name: Release

# Tag a commit with e.g. "v1.2.0" and push the tag to build and publish a
# Windows binary. The app's built-in updater looks for exactly this asset
# name attached to the latest GitHub Release (see internal/update).
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build dashboard frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - run: go vet ./...
      - run: go test ./... -race

      - name: Build
        # -H=windowsgui: no console window. The dashboard + tray icon are
        # the whole UI; a flashing terminal would just be visual noise for
        # a non-technical streamer.
        run: go build -ldflags="-s -w -X main.version=${{ github.ref_name }} -H=windowsgui" -o streamer-remote-windows-amd64.exe ./cmd/streamerctl

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} streamer-remote-windows-amd64.exe --title ${{ github.ref_name }} --generate-notes
